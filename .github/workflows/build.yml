#
# NOTE: the riscv64 prebuild job needs the machine-linux-image headers
# version kept in sync with deps/machine-guest-tools (see its Makefile
# LINUX_HEADERS_* variables).
#
# Releasing is driven by changesets (see release.yml): merging the
# "Version Packages" PR creates the vX.Y.Z tag and dispatches this workflow
# on it (workflow_dispatch, because GITHUB_TOKEN tag pushes don't trigger
# workflows). The publish job verifies the tag, merges the prebuilds,
# smoke-tests the packed tarball and publishes to npm via trusted
# publishing (OIDC).
name: Build
on:
  push:
  workflow_dispatch:

env:
  LINUX_IMAGE_VERSION: v0.20.0
  LINUX_VERSION: 6.5.13-ctsi-1

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install (compiles addon against the libcmt mock)
        run: npm install

      - name: Test
        run: npm test

      - name: Check packaging (dual ESM + CJS)
        run: npm run check:package

  prebuild:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest # linux-x64
          - os: ubuntu-24.04-arm # linux-arm64
          - os: macos-15-intel # darwin-x64
          - os: macos-latest # darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - run: npm install --ignore-scripts
      - run: npm run prebuild

      - uses: actions/upload-artifact@v7
        with:
          name: prebuilds-${{ matrix.os }}
          if-no-files-found: error
          path: prebuilds/

  prebuild-riscv64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install riscv64 cross toolchain and Cartesi Linux headers
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc-riscv64-linux-gnu g++-riscv64-linux-gnu
          wget -O /tmp/linux-libc-dev.deb \
            "https://github.com/cartesi/machine-linux-image/releases/download/${LINUX_IMAGE_VERSION}/linux-libc-dev-riscv64-cross-${LINUX_VERSION}-${LINUX_IMAGE_VERSION}.deb"
          sudo apt-get install -y --allow-downgrades /tmp/linux-libc-dev.deb

      - name: Cross-build libcmt (real IO driver)
        run: make -C deps/machine-guest-tools/sys-utils/libcmt libcmt TOOLCHAIN_PREFIX=riscv64-linux-gnu-

      - run: npm install --ignore-scripts

      - name: Prebuild riscv64 addon
        env:
          CC: riscv64-linux-gnu-gcc
          CXX: riscv64-linux-gnu-g++
          LIBCMT_LIB: ${{ github.workspace }}/deps/machine-guest-tools/sys-utils/libcmt/build/riscv64/libcmt.a
        run: npx prebuildify --napi --strip --strip-bin riscv64-linux-gnu-strip --platform linux --arch riscv64

      - uses: actions/upload-artifact@v7
        with:
          name: prebuilds-riscv64
          if-no-files-found: error
          path: prebuilds/

  # Runs the riscv64 prebuild inside a real (emulated) Cartesi Machine,
  # exercising the real IO driver end to end (see test/machine/run.sh).
  test-machine:
    needs: prebuild-riscv64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: riscv64

      - uses: actions/download-artifact@v7
        with:
          name: prebuilds-riscv64
          path: prebuilds/

      - name: Run end-to-end test inside cartesi-machine
        run: |
          CARTESI_MACHINE="docker run --rm -u $(id -u):$(id -g) -v $PWD:/mnt -w /mnt cartesi/machine-emulator:0.19.0 cartesi-machine" \
          SKIP_PREBUILD=1 test/machine/run.sh

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, test-machine, prebuild, prebuild-riscv64]
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub release
      id-token: write # npm trusted publishing (OIDC) + provenance
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # trusted publishing (OIDC) requires npm >= 11.5.1; node 22 bundles npm 10
      - name: Update npm
        run: npm install -g npm@latest

      - name: Check tag matches package.json version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [ "v${VERSION}" != "${GITHUB_REF_NAME}" ]; then
            echo "tag ${GITHUB_REF_NAME} does not match package.json version ${VERSION}" >&2
            exit 1
          fi

      - name: Merge prebuilds
        uses: actions/download-artifact@v8
        with:
          pattern: prebuilds-*
          merge-multiple: true
          path: prebuilds/

      - name: List prebuilds
        run: ls -lR prebuilds/

      - name: Pack
        run: |
          npm pack
          TARBALL=$(ls tuler-node-libcmt-*.tgz)
          echo "TARBALL=${TARBALL}" >> "$GITHUB_ENV"
          # the tarball must carry the prebuilds and the libcmt sources/headers
          # needed for from-source fallback
          tar -tzf "${TARBALL}" | grep -q 'package/prebuilds/linux-x64/'
          tar -tzf "${TARBALL}" | grep -q 'package/prebuilds/linux-riscv64/'
          tar -tzf "${TARBALL}" | grep -q 'package/deps/machine-guest-tools/sys-utils/libcmt/include/libcmt/rollup.h'
          tar -tzf "${TARBALL}" | grep -q 'package/deps/machine-guest-tools/sys-utils/libcmt/src/rollup.c'

      - name: Smoke-test packed tarball
        run: |
          mkdir /tmp/smoke && cd /tmp/smoke
          npm init -y > /dev/null
          npm install "${GITHUB_WORKSPACE}/${TARBALL}"
          # the prebuild must be used: a from-source fallback leaves a build/ dir
          test ! -d node_modules/@tuler/node-libcmt/build
          printf 'gio-reply' > reply.bin
          CMT_INPUTS="42:reply.bin" node -e "
            const assert = require('node:assert');
            const { Rollup } = require('@tuler/node-libcmt');
            const rollup = new Rollup();
            const response = rollup.gio({ domain: 1, id: '0x01' });
            assert.equal(response.responseCode, 42);
            assert.equal(response.responseData.toString(), 'gio-reply');
            rollup.close();
            console.log('smoke test passed');
          "

      # authenticates via OIDC (trusted publishing): no token, provenance is
      # generated automatically. Requires the trusted publisher configured on
      # npmjs.com for @tuler/node-libcmt (repo tuler/libcmt-node, build.yml)
      - name: Publish to npm
        run: npm publish "${TARBALL}"

      - uses: softprops/action-gh-release@v3
        with:
          prerelease: true
          files: ${{ env.TARBALL }}
